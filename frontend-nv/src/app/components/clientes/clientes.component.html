<div class="gaming-bg">
  <div class="container py-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-4 text-light">
      <h2 class="title-glow">🎮 Gestión de Usuarios</h2>
      <div *ngIf="user$ | async as user">
        <span class="me-3">👾 {{ $any(user).email }}</span>
        <button class="btn btn-danger btn-sm" (click)="logout()">Cerrar sesión</button>
      </div>
    </div>

    <!-- BOTÓN IR A COMPRAS -->
    <div class="text-end mb-3">
      <button class="btn btn-success gaming-btn" (click)="irACompras()">🛒 Ir al formulario de compras</button>
    </div>

    <!-- FORMULARIO -->
    <div class="card gaming-card mb-4">
      <div class="card-header">
        <h4>{{ editingId ? '✏️ Editar' : '🆕 Nuevo' }} Usuario</h4>
      </div>
      <div class="card-body">
        <form [formGroup]="clienteForm" (ngSubmit)="onSubmit()">
          <div class="row">
            <div class="col-md-6 mb-3">
              <label>Nombre</label>
              <input type="text" class="form-control gaming-input" formControlName="nombre">
            </div>
            <div class="col-md-6 mb-3">
              <label>Correo</label>
              <input type="email" class="form-control gaming-input" formControlName="correo">
            </div>
          </div>
          <button class="btn gaming-btn w-100 mt-2">{{ editingId ? 'Actualizar' : 'Guardar' }}</button>
        </form>
      </div>
    </div>

    <!-- TABLA DE USUARIOS -->
    <div class="card gaming-card">
      <div class="card-header">
        <h4>🕹️ Lista de Usuarios ({{ (clientes$ | async)?.length || 0 }})</h4>
      </div>
      <div class="card-body">
        <div class="table-responsive">
          <table class="table table-dark table-hover text-center">
            <thead>
              <tr>
                <th>UID</th>
                <th>Nombre</th>
                <th>Correo</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let cliente of clientes$ | async">
                <td>{{ cliente.uid_firebase | slice:0:8 }}...</td>
                <td>{{ cliente.nombre }}</td>
                <td>{{ cliente.correo }}</td>
                <td>
                  <button class="btn btn-warning btn-sm me-2" (click)="editCliente(cliente)">✏️</button>
                  <button class="btn btn-danger btn-sm" (click)="deleteCliente(cliente.id)">🗑️</button>
                </td>
              </tr>
              <tr *ngIf="(clientes$ | async)?.length === 0">
                <td colspan="4">No hay usuarios</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>

  </div>
</div>
